name: Update Market & Supply Outlook
on:
  schedule:
    - cron: '0 */8 * * *'
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: news-update
  cancel-in-progress: false
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Refresh outlook (Gemini free tier) and rebuild News page
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || secrets.GEMINI_MAY_API_KEY }}
        run: python3 tools/gen_news_gemini.py
      - name: Commit & push if changed
        run: |
          git config user.name "Birdland News Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "News auto-update $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
