name: Update Market & Supply Outlook
on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: news-update
  cancel-in-progress: false
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Refresh outlook (Gemini) + rebuild News page
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || secrets.GEMINI_MAY_API_KEY }}
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY || secrets.TWELVEDATA_MAY_API_KEY }}
        run: |
          set +e
          echo "::group::gen_news_gemini"
          python3 tools/gen_news_gemini.py 2>&1 | tee /tmp/gen.log
          echo "gen exit: ${PIPESTATUS[0]}"
          echo "::endgroup::"
          echo "::group::fetch_market"
          python3 tools/fetch_market.py 2>&1 | tee -a /tmp/gen.log
          echo "::endgroup::"
          python3 tools/build_news.py 2>&1 | tee -a /tmp/gen.log
          echo "build exit: ${PIPESTATUS[0]}"
          echo "::group::validate outlook-data.json"
          python3 -c "import json; d=json.load(open('outlook-data.json',encoding='utf-8')); r=d.get('regions',{}); assert len(r)==14, 'expected 14 regions, got %d'%len(r); assert {o[0] for o in d['order']}==set(r), 'order/regions key mismatch'; assert d.get('updated'), 'missing updated'; print('outlook-data.json OK:', len(r), 'regions,', d['updated'])"
          rc=$?
          echo "::endgroup::"
          if [ $rc -ne 0 ]; then echo "JSON validation FAILED — aborting, will not push."; exit 1; fi
          exit 0
      - name: Commit & push if changed
        run: |
          git config user.name "Birdland News Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          echo "--- git status ---"; git status --short
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "News auto-update $(date -u +%Y-%m-%dT%H:%MZ)"
            git push && echo "pushed" || echo "PUSH FAILED — check Settings > Actions > General > Workflow permissions = Read and write"
          fi
